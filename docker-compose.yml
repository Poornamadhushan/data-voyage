services:
  datavoyage:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Set SESSION_SECRET and other secrets via env or an env_file.
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads

